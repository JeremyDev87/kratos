name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to release, for example v0.1.0
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  resolve:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      npmDistTag: ${{ steps.meta.outputs.npmDistTag }}
      isPrerelease: ${{ steps.meta.outputs.isPrerelease }}

    steps:
      - name: Checkout workflow files
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ github.ref_name }}"
          else
            tag="${{ inputs.tag }}"
          fi

          node ./scripts/release-plan.mjs "$tag" >> "$GITHUB_OUTPUT"

  verify-node:
    name: Verify Node Package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: resolve
    env:
      NPM_CONFIG_CACHE: .npm-cache

    steps:
      - name: Checkout tagged release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-package-lock
          fi

      - name: Run node verification
        run: npm run verify

  verify-rust:
    name: Verify Rust Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: resolve

    steps:
      - name: Checkout tagged release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust workspace tests
        run: cargo test --workspace

  build-native-artifacts:
    name: Build Native Artifact (${{ matrix.target }})
    needs:
      - resolve
      - verify-rust
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            platform: darwin
            arch: arm64
            node_os: darwin
            node_cpu: arm64
            target: aarch64-apple-darwin
            os_family: macos
            built_library: target/aarch64-apple-darwin/release/libkratos_node.dylib
          - runner: macos-15-intel
            platform: darwin
            arch: x64
            node_os: darwin
            node_cpu: x64
            target: x86_64-apple-darwin
            os_family: macos
            built_library: target/x86_64-apple-darwin/release/libkratos_node.dylib
          - runner: ubuntu-latest
            platform: linux
            arch: x64
            node_os: linux
            node_cpu: x64
            target: x86_64-unknown-linux-gnu
            os_family: linux
            built_library: target/x86_64-unknown-linux-gnu/release/libkratos_node.so
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            node_os: linux
            node_cpu: arm64
            target: aarch64-unknown-linux-gnu
            os_family: linux
            built_library: target/aarch64-unknown-linux-gnu/release/libkratos_node.so
          - runner: windows-latest
            platform: win32
            arch: x64
            node_os: win32
            node_cpu: x64
            target: x86_64-pc-windows-msvc
            os_family: windows
            built_library: target/x86_64-pc-windows-msvc/release/kratos_node.dll

    steps:
      - name: Checkout tagged release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add release target
        run: rustup target add ${{ matrix.target }}

      - name: Resolve addon package metadata
        id: addon
        shell: bash
        run: |
          package_name=$(node --input-type=module -e "import { resolveAddonPackageName } from './bin/kratos.js'; console.log(resolveAddonPackageName('${{ matrix.platform }}', '${{ matrix.arch }}'));")
          package_slug=${package_name##*/}

          archive_name="${package_slug}-${{ needs.resolve.outputs.version }}-${{ matrix.target }}.tar.gz"

          {
            echo "package_name=$package_name"
            echo "package_slug=$package_slug"
            echo "archive_name=$archive_name"
          } >> "$GITHUB_OUTPUT"

      - name: Build native addon library
        run: cargo build -p kratos-node --release --target ${{ matrix.target }}

      - name: Package native addon artifact
        shell: bash
        run: |
          staging_dir="dist/native/${{ steps.addon.outputs.package_slug }}"
          mkdir -p "$staging_dir"

          cp "${{ matrix.built_library }}" "$staging_dir/kratos.node"
          printf '%s\n' "${{ steps.addon.outputs.package_name }}" > "$staging_dir/PACKAGE_NAME"
          printf '%s\n' "${{ matrix.target }}" > "$staging_dir/TARGET"
          printf '%s\n' "${{ needs.resolve.outputs.tag }}" > "$staging_dir/RELEASE_TAG"

          tar -czf "${{ steps.addon.outputs.archive_name }}" -C "$staging_dir" .

      - name: Smoke native addon archive
        shell: bash
        run: |
          extract_dir=$(mktemp -d)
          tar -xzf "${{ steps.addon.outputs.archive_name }}" -C "$extract_dir"

          test -f "$extract_dir/kratos.node"
          test "$(cat "$extract_dir/PACKAGE_NAME")" = "${{ steps.addon.outputs.package_name }}"
          test "$(cat "$extract_dir/TARGET")" = "${{ matrix.target }}"
          test "$(cat "$extract_dir/RELEASE_TAG")" = "${{ needs.resolve.outputs.tag }}"

          node -e "const addon=require(process.argv[1]); const runCli=typeof addon.runCli==='function'?addon.runCli:typeof addon.default?.runCli==='function'?addon.default.runCli:null; if (!runCli) throw new Error('runCli missing');" "$extract_dir/kratos.node"

      - name: Stage addon npm package
        shell: bash
        env:
          PACKAGE_DIR: dist/npm/${{ steps.addon.outputs.package_slug }}
          PACKAGE_NAME: ${{ steps.addon.outputs.package_name }}
          PACKAGE_VERSION: ${{ needs.resolve.outputs.version }}
          PACKAGE_OS: ${{ matrix.node_os }}
          PACKAGE_CPU: ${{ matrix.node_cpu }}
        run: |
          mkdir -p "$PACKAGE_DIR"
          cp "${{ matrix.built_library }}" "$PACKAGE_DIR/kratos.node"

          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const packageJsonPath = `${process.env.PACKAGE_DIR}/package.json`;
          const pkg = {
            name: process.env.PACKAGE_NAME,
            version: process.env.PACKAGE_VERSION,
            description: `Prebuilt native addon for ${process.env.PACKAGE_NAME}.`,
            license: "MIT",
            homepage: "https://github.com/JeremyDev87/kratos#readme",
            repository: {
              type: "git",
              url: "git+https://github.com/JeremyDev87/kratos.git",
            },
            main: "./kratos.node",
            files: ["kratos.node"],
            os: [process.env.PACKAGE_OS],
            cpu: [process.env.PACKAGE_CPU],
            engines: {
              node: ">=18",
            },
            publishConfig: {
              access: "public",
            },
          };

          fs.writeFileSync(packageJsonPath, JSON.stringify(pkg, null, 2) + "\n");
          NODE

      - name: Pack addon npm package
        id: addon_pack
        shell: bash
        env:
          PACKAGE_DIR: dist/npm/${{ steps.addon.outputs.package_slug }}
        run: |
          mkdir -p dist/npm-tarballs
          tarball=$(npm pack "$PACKAGE_DIR" --pack-destination dist/npm-tarballs --cache ./.npm-cache)
          echo "tarball=dist/npm-tarballs/$tarball" >> "$GITHUB_OUTPUT"

      - name: Smoke addon npm package
        shell: bash
        run: |
          smoke_dir=$(mktemp -d)
          tarball_path="$GITHUB_WORKSPACE/${{ steps.addon_pack.outputs.tarball }}"

          if command -v cygpath >/dev/null 2>&1; then
            tarball_path=$(cygpath -m "$tarball_path")
          fi

          pushd "$smoke_dir" >/dev/null
          npm init -y >/dev/null 2>&1
          npm install "$tarball_path" --cache "$GITHUB_WORKSPACE/.npm-cache" --no-package-lock >/dev/null
          node -e "const addon=require(process.argv[1]); const runCli=typeof addon.runCli==='function'?addon.runCli:typeof addon.default?.runCli==='function'?addon.default.runCli:null; if (!runCli) throw new Error('runCli missing');" "${{ steps.addon.outputs.package_name }}"
          popd >/dev/null

      - name: Smoke root package with current native addon
        shell: bash
        env:
          KRATOS_PACKAGE_SMOKE_NATIVE_LIB: ${{ matrix.built_library }}
        run: node --test test/package-smoke.test.js

      - name: Upload native addon artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.target }}
          path: ${{ steps.addon.outputs.archive_name }}
          if-no-files-found: error

      - name: Upload addon npm package
        uses: actions/upload-artifact@v7
        with:
          name: addon-npm-${{ matrix.target }}
          path: ${{ steps.addon_pack.outputs.tarball }}
          if-no-files-found: error

  publish-addon-packages:
    name: Publish Addon Packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - resolve
      - verify-node
      - build-native-artifacts
    env:
      NPM_CONFIG_CACHE: .npm-cache

    steps:
      - name: Checkout tagged release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download addon npm tarballs
        uses: actions/download-artifact@v7
        with:
          pattern: addon-npm-*
          path: addon-packages
          merge-multiple: true

      - name: Detect npm auth mode
        id: auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
          else
            echo "mode=trusted" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish addon packages with trusted publishing
        if: ${{ steps.auth.outputs.mode == 'trusted' }}
        shell: bash
        env:
          NPM_DIST_TAG: ${{ needs.resolve.outputs.npmDistTag }}
        run: |
          shopt -s nullglob
          tarballs=(addon-packages/*.tgz)

          if [ "${#tarballs[@]}" -eq 0 ]; then
            echo "No addon npm tarballs were downloaded."
            exit 1
          fi

          for tarball in "${tarballs[@]}"; do
            metadata_file=$(mktemp addon-package-XXXXXX.json)
            tar -xOf "$tarball" package/package.json > "$metadata_file"

            package_name=$(node --input-type=module -e "import fs from 'node:fs'; const pkg = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log(pkg.name);" "$metadata_file")
            package_version=$(node --input-type=module -e "import fs from 'node:fs'; const pkg = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log(pkg.version);" "$metadata_file")

            rm -f "$metadata_file"

            if npm view "${package_name}@${package_version}" version --registry=https://registry.npmjs.org >/tmp/npm-version.txt 2>/tmp/npm-view-error.txt; then
              echo "Addon package ${package_name}@${package_version} already published, skipping."
              continue
            fi

            lookup_state=$(node ./scripts/classify-npm-lookup-error.mjs /tmp/npm-view-error.txt)
            if [ "$lookup_state" != "not-found" ]; then
              cat /tmp/npm-view-error.txt
              exit 1
            fi

            if npm publish "./$tarball" --access public --tag "$NPM_DIST_TAG" >/tmp/npm-publish.txt 2>/tmp/npm-publish-error.txt; then
              echo "Published ${package_name}@${package_version}"
              continue
            fi

            publish_state=$(node ./scripts/classify-npm-publish-error.mjs /tmp/npm-publish-error.txt)
            if [ "$publish_state" = "already-published" ]; then
              echo "Addon package ${package_name}@${package_version} was already published during a rerun, continuing."
            else
              cat /tmp/npm-publish-error.txt
              exit 1
            fi
          done

      - name: Publish addon packages with token fallback
        if: ${{ steps.auth.outputs.mode == 'token' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_DIST_TAG: ${{ needs.resolve.outputs.npmDistTag }}
        shell: bash
        run: |
          shopt -s nullglob
          tarballs=(addon-packages/*.tgz)

          if [ "${#tarballs[@]}" -eq 0 ]; then
            echo "No addon npm tarballs were downloaded."
            exit 1
          fi

          for tarball in "${tarballs[@]}"; do
            metadata_file=$(mktemp addon-package-XXXXXX.json)
            tar -xOf "$tarball" package/package.json > "$metadata_file"

            package_name=$(node --input-type=module -e "import fs from 'node:fs'; const pkg = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log(pkg.name);" "$metadata_file")
            package_version=$(node --input-type=module -e "import fs from 'node:fs'; const pkg = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log(pkg.version);" "$metadata_file")

            rm -f "$metadata_file"

            if npm view "${package_name}@${package_version}" version --registry=https://registry.npmjs.org >/tmp/npm-version.txt 2>/tmp/npm-view-error.txt; then
              echo "Addon package ${package_name}@${package_version} already published, skipping."
              continue
            fi

            lookup_state=$(node ./scripts/classify-npm-lookup-error.mjs /tmp/npm-view-error.txt)
            if [ "$lookup_state" != "not-found" ]; then
              cat /tmp/npm-view-error.txt
              exit 1
            fi

            if npm publish "./$tarball" --access public --tag "$NPM_DIST_TAG" >/tmp/npm-publish.txt 2>/tmp/npm-publish-error.txt; then
              echo "Published ${package_name}@${package_version}"
              continue
            fi

            publish_state=$(node ./scripts/classify-npm-publish-error.mjs /tmp/npm-publish-error.txt)
            if [ "$publish_state" = "already-published" ]; then
              echo "Addon package ${package_name}@${package_version} was already published during a rerun, continuing."
            else
              cat /tmp/npm-publish-error.txt
              exit 1
            fi
          done

  publish-root-package:
    name: Publish Root Package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - resolve
      - verify-node
      - verify-rust
      - publish-addon-packages
    env:
      NPM_CONFIG_CACHE: .npm-cache

    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}

    steps:
      - name: Checkout tagged release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-package-lock
          fi

      - name: Verify package version matches tag
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          package_version=$(node -p "require('./package.json').version")
          if [ "v$package_version" != "$RELEASE_TAG" ]; then
            echo "Tag $RELEASE_TAG does not match package.json version v$package_version"
            exit 1
          fi

      - name: Check whether this version already exists on npm
        id: npm_state
        shell: bash
        run: |
          package_name=$(node -p "require('./package.json').name")
          if npm view "${package_name}@${{ needs.resolve.outputs.version }}" version --registry=https://registry.npmjs.org >/tmp/npm-version.txt 2>/tmp/npm-view-error.txt; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            lookup_state=$(node ./scripts/classify-npm-lookup-error.mjs /tmp/npm-view-error.txt)

            if [ "$lookup_state" = "not-found" ]; then
              echo "already_published=false" >> "$GITHUB_OUTPUT"
            else
              cat /tmp/npm-view-error.txt
              exit 1
            fi
          fi

      - name: Pack release tarball
        id: pack
        shell: bash
        run: |
          tarball=$(npm pack --cache ./.npm-cache)
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Smoke install packed root package
        shell: bash
        run: |
          smoke_dir=$(mktemp -d)
          pushd "$smoke_dir" >/dev/null
          npm init -y >/dev/null 2>&1
          npm install "$GITHUB_WORKSPACE/${{ steps.pack.outputs.tarball }}" --no-package-lock
          ./node_modules/.bin/kratos --help >/dev/null
          popd >/dev/null

      - name: Upload root npm tarball
        uses: actions/upload-artifact@v7
        with:
          name: root-npm-tarball
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error

      - name: Detect npm auth mode
        id: auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
          else
            echo "mode=trusted" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with trusted publishing
        if: ${{ steps.auth.outputs.mode == 'trusted' && steps.npm_state.outputs.already_published != 'true' }}
        shell: bash
        run: |
          if npm publish "./${{ steps.pack.outputs.tarball }}" --access public --tag "${{ needs.resolve.outputs.npmDistTag }}" >/tmp/npm-publish.txt 2>/tmp/npm-publish-error.txt; then
            exit 0
          fi

          publish_state=$(node ./scripts/classify-npm-publish-error.mjs /tmp/npm-publish-error.txt)

          if [ "$publish_state" = "already-published" ]; then
            echo "npm package version was already published during a rerun, continuing."
          else
            cat /tmp/npm-publish-error.txt
            exit 1
          fi

      - name: Publish to npm with token fallback
        if: ${{ steps.auth.outputs.mode == 'token' && steps.npm_state.outputs.already_published != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if npm publish "./${{ steps.pack.outputs.tarball }}" --access public --tag "${{ needs.resolve.outputs.npmDistTag }}" >/tmp/npm-publish.txt 2>/tmp/npm-publish-error.txt; then
            exit 0
          fi

          publish_state=$(node ./scripts/classify-npm-publish-error.mjs /tmp/npm-publish-error.txt)

          if [ "$publish_state" = "already-published" ]; then
            echo "npm package version was already published during a rerun, continuing."
          else
            cat /tmp/npm-publish-error.txt
            exit 1
          fi

      - name: Skip npm publish when version already exists
        if: ${{ steps.npm_state.outputs.already_published == 'true' }}
        run: echo "npm package version already published, skipping publish step."

  github-release:
    name: Create or Update GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - resolve
      - build-native-artifacts
      - publish-addon-packages
      - publish-root-package
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download root npm tarball
        uses: actions/download-artifact@v7
        with:
          name: root-npm-tarball
          path: release-assets

      - name: Download native addon artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: native-*
          path: release-assets
          merge-multiple: true

      - name: Download addon npm tarballs
        uses: actions/download-artifact@v7
        with:
          pattern: addon-npm-*
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub release
        shell: bash
        env:
          IS_PRERELEASE: ${{ needs.resolve.outputs.isPrerelease }}
        run: |
          shopt -s nullglob
          assets=(release-assets/*)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi

          if gh release view "${{ needs.resolve.outputs.tag }}" >/dev/null 2>&1; then
            if [ "$IS_PRERELEASE" = "true" ]; then
              gh release edit "${{ needs.resolve.outputs.tag }}" --prerelease
            fi
            gh release upload "${{ needs.resolve.outputs.tag }}" "${assets[@]}" --clobber
          else
            release_args=()
            if [ "$IS_PRERELEASE" = "true" ]; then
              release_args+=(--prerelease)
            fi
            gh release create "${{ needs.resolve.outputs.tag }}" "${assets[@]}" --generate-notes --title "${{ needs.resolve.outputs.tag }}" "${release_args[@]}"
          fi
