name: Manual Release Bump

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Target release tag or version, for example v0.2.0 or 0.2.0-alpha.2
        required: true
        type: string
      base_ref:
        description: Base branch to update
        required: false
        default: master
        type: string
      dry_run:
        description: Validate and prepare the bump without pushing a branch or opening a PR
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: manual-release-bump-${{ inputs.base_ref }}-${{ startsWith(inputs.tag, 'v') && inputs.tag || format('v{0}', inputs.tag) }}
  cancel-in-progress: false

jobs:
  bump_release_version:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.base_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve bump metadata
        id: meta
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          if [[ "$tag" != v* ]]; then
            tag="v$tag"
          fi

          node ./scripts/release-plan.mjs "$tag" >> "$GITHUB_OUTPUT"

          current_version=$(node -p "require('./package.json').version")
          node --input-type=module -e "import { assertReleaseUpgrade } from './scripts/lib/release.mjs'; assertReleaseUpgrade(process.argv[1], process.argv[2]);" "$current_version" "${tag#v}"

          branch=$(node --input-type=module -e "import { createManualBumpBranchName } from './scripts/bump-release-version.mjs'; console.log(createManualBumpBranchName(process.argv[1], process.argv[2]));" "$tag" "${{ inputs.base_ref }}")

          if [ "${{ inputs.base_ref }}" = "master" ]; then
            candidate_verification_line="merge нӣ„ \`Release Candidate Core Verification\` workflowк°Җ \`master\`м—җм„ң мһҗлҸҷ мӢӨн–үлҗҳм–ҙ tag м „ нӣ„ліҙ commitмқ„ кІҖмҰқн•©лӢҲлӢӨ."
            candidate_follow_up_line="мӢӨм ң tag м „м—җлҠ” кІҖмҰқлҗң same-commitмқҳ \`CI\` workflow native packaging кІ°кіјлҸ„ greenмқём§Җ нҷ•мқён•ҙм•ј н•©лӢҲлӢӨ."
          else
            candidate_verification_line="\`${{ inputs.base_ref }}\`лҠ” мһҗлҸҷ лҢҖмғҒмқҙ м•„лӢҲлҜҖлЎң merge нӣ„ н•ҙлӢ№ merge commit SHAлҘј \`target_sha\`лЎң л„Јм–ҙ \`Release Candidate Core Verification\` workflowлҘј мҲҳлҸҷ мӢӨн–үн•ҙ нӣ„ліҙ commitмқ„ кІҖмҰқн•ҙм•ј н•©лӢҲлӢӨ."
            candidate_follow_up_line="мӢӨм ң tag м „м—җлҠ” к°ҷмқҖ merge commit SHAлҘј \`target_sha\`лЎң л„Јм–ҙ \`CI\` workflowлҸ„ мҲҳлҸҷ мӢӨн–үн•ҳкі , native packaging jobsк№Ңм§Җ greenмқём§Җ нҷ•мқён•ҙм•ј н•©лӢҲлӢӨ."
          fi

          {
            echo "currentVersion=$current_version"
            echo "branch=$branch"
            echo "title=chore: ${tag#v} мҲҳлҸҷ bump"
            printf 'candidateVerificationLine=%s\n' "$candidate_verification_line"
            printf 'candidateFollowupLine=%s\n' "$candidate_follow_up_line"
          } >> "$GITHUB_OUTPUT"

      - name: Apply version bump
        run: node ./scripts/bump-release-version.mjs "${{ steps.meta.outputs.tag }}"

      - name: Verify changed files before package verification
        shell: bash
        run: |
          changed_files=$(git diff --name-only)
          if [ "$changed_files" != "package.json" ]; then
            echo "Unexpected changed files:"
            printf '%s\n' "$changed_files"
            exit 1
          fi

      - name: Verify package
        run: npm run verify

      - name: Verify changed files after package verification
        shell: bash
        run: |
          changed_files=$(git diff --name-only)
          if [ "$changed_files" != "package.json" ]; then
            echo "Unexpected changed files after verification:"
            printf '%s\n' "$changed_files"
            exit 1
          fi

      - name: Stop after dry run
        if: ${{ inputs.dry_run }}
        run: echo "Dry run requested; skipping branch push and PR creation."

      - name: Configure git author
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure skip-changelog label exists
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          if gh label list --search "skip-changelog" --json name --jq 'map(select(.name == "skip-changelog")) | length > 0' | grep -q true; then
            exit 0
          fi

          gh label create "skip-changelog" \
            --color "6E7781" \
            --description "Exclude automated release prep PRs from release notes."

      - name: Resolve existing open PR
        if: ${{ !inputs.dry_run }}
        id: existing_pr
        shell: bash
        env:
          EXPECTED_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          pr_json=$(gh pr list \
            --head "${{ steps.meta.outputs.branch }}" \
            --state open \
            --json number,url,baseRefName,labels,headRefOid)

          pr_number=$(printf '%s' "$pr_json" | jq -r '.[0].number // empty')
          pr_url=$(printf '%s' "$pr_json" | jq -r '.[0].url // empty')
          pr_base=$(printf '%s' "$pr_json" | jq -r '.[0].baseRefName // empty')
          pr_head_sha=$(printf '%s' "$pr_json" | jq -r '.[0].headRefOid // empty')
          has_skip_changelog=$(printf '%s' "$pr_json" | jq -r 'if (.[0].labels // []) | map(.name) | index("skip-changelog") then "true" else "false" end')

          if [ -n "$pr_number" ] && [ "$pr_base" != "${{ inputs.base_ref }}" ]; then
            echo "Existing PR $pr_url targets base '$pr_base', expected '${{ inputs.base_ref }}'."
            exit 1
          fi

          if [ -n "$pr_number" ]; then
            git fetch origin \
              "refs/heads/${{ inputs.base_ref }}:refs/remotes/origin/${{ inputs.base_ref }}" \
              "refs/heads/${{ steps.meta.outputs.branch }}:refs/remotes/origin/${{ steps.meta.outputs.branch }}"

            fetched_head_sha=$(git rev-parse "refs/remotes/origin/${{ steps.meta.outputs.branch }}")
            if [ "$pr_head_sha" != "$fetched_head_sha" ]; then
              echo "Existing PR $pr_url head drifted from '$pr_head_sha' to '$fetched_head_sha' during validation."
              exit 1
            fi

            pr_diff_files=$(git diff --name-only \
              "refs/remotes/origin/${{ inputs.base_ref }}...refs/remotes/origin/${{ steps.meta.outputs.branch }}")

            if [ "$pr_diff_files" != "package.json" ]; then
              echo "Existing PR $pr_url is not a package.json-only bump."
              printf '%s\n' "$pr_diff_files"
              exit 1
            fi

            package_json_file=$(mktemp)
            git show "refs/remotes/origin/${{ steps.meta.outputs.branch }}:package.json" > "$package_json_file"
            node --input-type=module -e "
              import fs from 'node:fs';

              const expectedVersion = process.env.EXPECTED_VERSION;
              const pkg = JSON.parse(fs.readFileSync(process.argv[1], 'utf8'));
              const mismatchedOptionalDeps = Object.entries(pkg.optionalDependencies ?? {})
                .filter(([, version]) => version !== expectedVersion)
                .map(([name, version]) => name + '@' + version);

              if (pkg.version !== expectedVersion || mismatchedOptionalDeps.length > 0) {
                console.error('Existing PR head does not match expected bump version ' + expectedVersion + '.');
                if (pkg.version !== expectedVersion) {
                  console.error('package.json version: ' + pkg.version);
                }
                if (mismatchedOptionalDeps.length > 0) {
                  console.error('optionalDependencies mismatches: ' + mismatchedOptionalDeps.join(', '));
                }
                process.exit(1);
              }
            " "$package_json_file"
            rm -f "$package_json_file"
          fi

          if [ -n "$pr_number" ] && [ "$has_skip_changelog" != "true" ]; then
            gh pr edit "$pr_number" --add-label skip-changelog
          fi

          {
            echo "number=$pr_number"
            echo "url=$pr_url"
            echo "head_sha=${fetched_head_sha:-$pr_head_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare bump branch
        if: ${{ !inputs.dry_run && steps.existing_pr.outputs.number == '' }}
        shell: bash
        run: |
          lease_args=()

          if git ls-remote --exit-code --heads origin "${{ steps.meta.outputs.branch }}" >/dev/null 2>&1; then
            echo "Remote branch ${{ steps.meta.outputs.branch }} already exists; refreshing it with the verified bump commit."
            git fetch origin "refs/heads/${{ steps.meta.outputs.branch }}:refs/remotes/origin/${{ steps.meta.outputs.branch }}"
            lease_args+=(--force-with-lease="refs/heads/${{ steps.meta.outputs.branch }}:$(git rev-parse "refs/remotes/origin/${{ steps.meta.outputs.branch }}")")
          fi

          git switch -C "${{ steps.meta.outputs.branch }}"
          git add package.json
          git commit -m "${{ steps.meta.outputs.title }}"
          git push "${lease_args[@]}" -u origin "${{ steps.meta.outputs.branch }}"

      - name: Dispatch CI for bump branch
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          if [ -n "${{ steps.existing_pr.outputs.head_sha }}" ]; then
            bump_sha="${{ steps.existing_pr.outputs.head_sha }}"
          else
            bump_sha=$(git rev-parse HEAD)
          fi

          gh workflow run ci.yml \
            --ref "${{ steps.meta.outputs.branch }}" \
            -f target_sha="$bump_sha"

      - name: Create or reuse draft PR
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          DEFAULT_GH_TOKEN: ${{ github.token }}
          PR_CREATE_TOKEN: ${{ secrets.KRATOS_RELEASE_BOT_TOKEN }}
        run: |
          cat > pr-body.md <<'EOF'
          ## л°°кІҪ / Background

          - manual release bump workflowлЎң \`${{ steps.meta.outputs.currentVersion }}\`м—җм„ң \`${{ steps.meta.outputs.version }}\`мңјлЎң мҠ№кІ©н•©лӢҲлӢӨ.
          - мӢӨм ң tag / publishлҠ” мқҙ PR merge мқҙнӣ„ лі„лҸ„ `Release Publish` workflowм—җм„ң м§„н–үн•©лӢҲлӢӨ.

          ## ліҖкІҪ мӮ¬н•ӯ / Changes

          - root package versionмқ„ \`${{ steps.meta.outputs.currentVersion }}\`м—җм„ң \`${{ steps.meta.outputs.version }}\`мңјлЎң мҳ¬л ёмҠөлӢҲлӢӨ.
          - root \`optionalDependencies\`мқҳ native addon лІ„м „лҸ„ лӘЁл‘җ \`${{ steps.meta.outputs.version }}\`мңјлЎң л§һм·„мҠөлӢҲлӢӨ.

          ## кІҖмҰқ / Verification

          - \`node ./scripts/release-plan.mjs ${{ steps.meta.outputs.tag }}\`
          - \`node ./scripts/bump-release-version.mjs ${{ steps.meta.outputs.tag }}\`
          - \`npm run verify\`
          - ${{ steps.meta.outputs.candidateVerificationLine }}

          ## лёҢлһңм№ҳ / мӣҢнҒ¬нҠёлҰ¬ / Branches and worktrees

          - base: \`${{ inputs.base_ref }}\`
          - branch: \`${{ steps.meta.outputs.branch }}\`

          ## лҰ¬мҠӨнҒ¬ лҳҗлҠ” нҷ•мқё нҸ¬мқёнҠё / Risks or follow-ups

          - stable tag / publishлҠ” м•„м§Ғ мӢӨн–үн•ҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.
          - ${{ steps.meta.outputs.candidateFollowupLine }}
          - release мӢӨн–ү м „ мөңмў… нҷ•мқёмқҙ н•„мҡ”н•©лӢҲлӢӨ.
          EOF

          if [ -n "$PR_CREATE_TOKEN" ]; then
            export GH_TOKEN="$PR_CREATE_TOKEN"
            token_source="KRATOS_RELEASE_BOT_TOKEN"
          else
            export GH_TOKEN="$DEFAULT_GH_TOKEN"
            token_source="github.token"
          fi

          if [ -n "${{ steps.existing_pr.outputs.url }}" ]; then
            echo "Reusing existing PR: ${{ steps.existing_pr.outputs.url }}"
            exit 0
          fi

          if pr_url=$(gh pr create \
            --draft \
            --base "${{ inputs.base_ref }}" \
            --head "${{ steps.meta.outputs.branch }}" \
            --title "${{ steps.meta.outputs.title }}" \
            --body-file pr-body.md \
            --label skip-changelog 2>/tmp/gh-pr-create-error.txt); then
            echo "Created draft PR: $pr_url"
            exit 0
          fi

          compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${{ inputs.base_ref }}...${{ steps.meta.outputs.branch }}?expand=1"

          {
            echo "### Manual release bump failed to create a PR"
            echo
            echo "The bump branch was pushed, but the workflow could not open a draft PR."
            echo
            echo "- base: \`${{ inputs.base_ref }}\`"
            echo "- branch: \`${{ steps.meta.outputs.branch }}\`"
            echo "- title: \`${{ steps.meta.outputs.title }}\`"
            echo "- token source: \`$token_source\`"
            echo "- compare URL: $compare_url"
            echo
            echo "Either enable repository Actions permission to create pull requests, or configure \`KRATOS_RELEASE_BOT_TOKEN\` with pull request creation permission."
          } >> "$GITHUB_STEP_SUMMARY"

          cat /tmp/gh-pr-create-error.txt
          echo "::error::Unable to create a draft PR for ${{ steps.meta.outputs.branch }}. See the step summary for required repository or token changes."
          exit 1
